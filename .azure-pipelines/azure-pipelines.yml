# azure-pipelines.yml
# CI pipeline for SerialPrograms

trigger: none
pr: none

resources:
  repositories:
    - repository: Arduino-Source-Internal
      type: github
      name: PokemonAutomation/Arduino-Source-Internal
      endpoint: PokemonAutomation

    - repository: Arduino-Source
      type: github
      name: PokemonAutomation/Arduino-Source
      endpoint: PokemonAutomation

variables:
  - group: apple-signing
  - group: github
  - group: discord-symbols
  - group: telemetry
  - group: alarm_clock
  - group: artifacts

parameters:
  - name: buildType
    displayName: Build Type
    type: string
    default: Commit
    values: [Commit, Release, Beta, PrivateBeta]

  - name: targetOS
    displayName: Target OS
    type: string
    default: All
    values: [All, Windows, Linux, MacOS]

  - name: versionMajor
    displayName: Version Major
    type: number
    default: 0

  - name: versionMinor
    displayName: Version Minor
    type: number
    default: 0

  - name: versionPatch
    displayName: Version Patch
    type: number
    default: 0

stages:

###########################################
#             WAKE-UP SIGNAL              #
###########################################
#- template: templates/wake-signal.yml
#  parameters:
#    stageName: Wake_Up_Signal
#    displayName: 'Send Wake-Up Signal'
#    dependsOn: []
#    poolName: AlarmClock
#    condition: always()

###########################################
#        SET VERSION BUILD NUMBER         #
###########################################

- stage: Set_Build_Number
  displayName: 'Set Build Number'
  dependsOn: []
  condition: succeeded()

  jobs:
    - job: SetVersion
      displayName: 'Set Build Number to Version'
      timeoutInMinutes: 10
      pool:
        vmImage: ubuntu-latest

      steps:
        - script: |
            VERSION="v${{ parameters.versionMajor }}.${{ parameters.versionMinor }}.${{ parameters.versionPatch }}"
            echo "Setting build number to $VERSION"
            echo "##vso[build.updatebuildnumber]$VERSION"
            echo "##vso[build.addbuildtag]${{ parameters.buildType }}"
          displayName: 'Set Build Number to Version'


###########################################
#         WINDOWS BUILD JOB               #
###########################################

- stage: Windows_Build_x64
  displayName: Windows Build x64
  dependsOn:
    #- Wake_Up_Signal
    - Set_Build_Number
  condition: and(succeeded(), or(eq('${{ parameters.targetOS }}', 'Windows'), eq('${{ parameters.targetOS }}', 'All')))

  jobs:
  - job: Windows
    timeoutInMinutes: 45
    cancelTimeoutInMinutes: 1
    displayName: Windows

    strategy:
      matrix:
        MSVC:
          poolName: 'WindowsPool'
          imageName: 'windows-2025'
          architecture: 'x64'
          compiler: 'MSVC'
          qt_version: '6.10.2'
          qt_version_major: '6'
          qt_modules: 'qtserialport qtmultimedia'
          cmake_preset: 'RelWithDebInfo'
          cmake_version_params: '-DVERSION_MAJOR=${{ parameters.versionMajor }} -DVERSION_MINOR=${{ parameters.versionMinor }} -DVERSION_PATCH=${{ parameters.versionPatch }} -DIS_BETA=${{ lower(eq(parameters.buildType, ''PrivateBeta'')) }}'
          cmake_additional_param: '-DCMAKE_PREFIX_PATH=C:/Qt/$(qt_version)/msvc2022_64/lib/cmake -DIS_AZURE_BUILD=TRUE'

    pool:
      name: $(poolName)

    steps:
      - template: templates/checkout.yml

      - task: BatchScript@1
        inputs:
          filename: 'C:/Program Files (x86)/Microsoft Visual Studio/2022/BuildTools/Common7/Tools/VsDevCmd.bat'
          arguments: '-arch=x64'
          modifyEnvironment: true
        displayName: 'Initialize VS Environment'
        condition: succeeded()

      - script: |
          cd /d "$(Pipeline.Workspace)/Arduino-Source-Internal/Repository/Public/SerialPrograms"
          cmake --preset=$(cmake_preset) $(cmake_additional_param) $(cmake_version_params)
        displayName: 'Configure CMake'
        condition: succeeded()

      - script: |
          cd /d "$(Pipeline.Workspace)/Arduino-Source-Internal/Repository/Public/SerialPrograms"
          cmake --build --preset=$(cmake_preset) -j 16
        displayName: 'Build'
        condition: succeeded()

      - powershell: |
          Write-Host "=== Running windeployqt ==="
          $BUILD_DIR = "$(Pipeline.Workspace)/Arduino-Source-Internal/Repository/Public/build/$(cmake_preset)"
          $APP_EXE   = "$BUILD_DIR/SerialPrograms.exe"
          $BUILD_CACHE = "$BUILD_DIR/cache-build/Binaries64"
          $SYMBOLS_CACHE = "$BUILD_DIR/cache-symbols"
          New-Item -ItemType Directory -Force -Path $BUILD_CACHE | Out-Null
          & "C:/Qt/$(qt_version)/msvc2022_64/bin/windeployqt.exe" --dir "$BUILD_CACHE" --release "$APP_EXE"
          New-Item -ItemType Directory -Force -Path $SYMBOLS_CACHE | Out-Null

          Write-Host "=== windeployqt complete ==="
        displayName: 'Deploy app'
        condition: succeeded()

      - powershell: |
          echo "=== Copying resources==="
          $PACKAGES_DIR = "$(Pipeline.Workspace)/Arduino-Source-Internal/Repository/Public/Packages" 
          $BUILD_DIR = "$(Pipeline.Workspace)/Arduino-Source-Internal/Repository/Public/build/$(cmake_preset)"
          $BINARIES_DIR = "$BUILD_DIR/cache-build/Binaries64"

          function Invoke-Robocopy {
              robocopy @args
              if ($LASTEXITCODE -ge 8) {
                  throw "Robocopy failed with exit code: $LASTEXITCODE"
              }
          }

          Invoke-Robocopy $PACKAGES_DIR/Resources $BUILD_DIR/cache-build/Resources /s
          Invoke-Robocopy $PACKAGES_DIR/Firmware  $BUILD_DIR/cache-build/Firmware  /s
          Invoke-Robocopy $BUILD_DIR              $BINARIES_DIR                    *.dll
          Invoke-Robocopy $BUILD_DIR              $BINARIES_DIR                    SerialPrograms.exe
          Invoke-Robocopy $BUILD_DIR              $BUILD_DIR/cache-symbols/        SerialPrograms.pdb

          Write-Host "=== Excluding unnecessary files from deployment ==="
          Remove-Item -Path "$BINARIES_DIR/opencv_world4120d.dll" -ErrorAction SilentlyContinue
          Remove-Item -Path "$BINARIES_DIR/translations"          -Recurse -Force -ErrorAction SilentlyContinue
          Remove-Item -Path "$BINARIES_DIR/generic"               -Recurse -Force -ErrorAction SilentlyContinue

          exit 0
        displayName: 'Copy resources'
        condition: succeeded()

      - powershell: |
          $BUILD_DIR = "$(Pipeline.Workspace)/Arduino-Source-Internal/Repository/Public/build/$(cmake_preset)"
          $BUILD_CACHE = "$BUILD_DIR/cache-build"

          $cmdContent = @'
          cd %~dp0

          if not exist Binaries64\ (
              echo.
              echo Please unzip the folder before you can use it.
              echo.
              pause
              exit
          )

          if not exist Binaries64\SerialPrograms.exe (
              echo.
              echo Binaries\SerialPrograms.exe not found. Did your anti-virus delete it?
              echo.
              pause
              exit
          )

          start "" Binaries64\SerialPrograms.exe

          '@

          Set-Content -Path "$BUILD_CACHE/SerialPrograms-Windows.cmd" -Value $cmdContent -Encoding UTF8
          Write-Host "=== Created SerialPrograms-Windows.cmd launcher ==="
        displayName: 'Create launcher script'
        condition: succeeded()

      - powershell: |
          $root = "$(Pipeline.Workspace)/Arduino-Source-Internal/Repository/Public/build/$(cmake_preset)"
          $version = "${{ parameters.versionMajor }}.${{ parameters.versionMinor }}.${{ parameters.versionPatch }}"
          $folderName = "SerialPrograms-$version-Windows-$(architecture)"
          $name = "SerialPrograms-Windows-$(compiler)-$(architecture)"
          $buildType = "${{ parameters.buildType }}"

          Write-Host "=== Creating enclosing folder: $folderName ==="
          $finalFolder = Join-Path $root $folderName
          Rename-Item "$root/cache-build" $finalFolder

          New-Item -ItemType Directory -Force -Path "$root/cache-build" | Out-Null
          $zipPath = Join-Path $root "cache-build/$name.zip"
          if ($buildType -eq "PrivateBeta") {
              Write-Host "=== Creating password-protected archive ==="
              & "C:/Program Files/7-Zip/7z.exe" a -tzip -mx=9 "-p$env:ARTIFACT_PASSWORD" -mem=AES256 $zipPath "$finalFolder"
          } else {
              Write-Host "=== Creating archive ==="
              & "C:/Program Files/7-Zip/7z.exe" a -tzip -mx=9 $zipPath "$finalFolder"
          }
          if ($LASTEXITCODE -ne 0) {
              throw "7-Zip failed with exit code: $LASTEXITCODE"
          }
          Write-Host "=== Archive created ==="
        displayName: 'Archive Windows build artifact'
        condition: and(succeeded(), ne('${{ parameters.buildType }}', 'Commit'))
        env:
          ARTIFACT_PASSWORD: $(ARTIFACT_PASSWORD)

      - task: Cache@2
        displayName: 'Cache build artifact for GitHub release'
        inputs:
          key: 'windows-build | "$(Build.BuildId)"'
          path: '$(Pipeline.Workspace)/Arduino-Source-Internal/Repository/Public/build/$(cmake_preset)/cache-build'
        condition: and(succeeded(), eq('${{ parameters.targetOS }}', 'All'), or(eq('${{ parameters.buildType }}', 'Release'), eq('${{ parameters.buildType }}', 'Beta')))

      - task: Cache@2
        displayName: 'Cache debug symbols'
        inputs:
          key: 'windows-symbols | "$(Build.BuildId)"'
          path: '$(Pipeline.Workspace)/Arduino-Source-Internal/Repository/Public/build/$(cmake_preset)/cache-symbols'
        condition: succeeded()

      - task: PublishPipelineArtifact@1
        displayName: 'Publish Windows artifact (PrivateBeta)'
        inputs:
          targetPath: '$(Pipeline.Workspace)/Arduino-Source-Internal/Repository/Public/build/$(cmake_preset)/SerialPrograms-Windows-$(compiler)-$(architecture).zip'
          artifactName: 'SerialPrograms-Windows-$(compiler)-$(architecture)'
          publishLocation: 'pipeline'
        condition: and(succeeded(), eq('${{ parameters.buildType }}', 'PrivateBeta'))

      - task: PublishPipelineArtifact@1
        displayName: 'Publish Windows artifact'
        inputs:
          targetPath: '$(Pipeline.Workspace)/Arduino-Source-Internal/Repository/Public/build/$(cmake_preset)/SerialPrograms-${{ parameters.versionMajor }}.${{ parameters.versionMinor }}.${{ parameters.versionPatch }}-Windows-$(architecture)'
          artifactName: 'SerialPrograms-Windows-$(compiler)-$(architecture)'
          publishLocation: 'pipeline'
        condition: and(succeeded(), ne('${{ parameters.buildType }}', 'PrivateBeta'))

###########################################
#         LINUX BUILD JOB                 #
###########################################

- stage: Linux_Build_x64
  displayName: Linux Build x64
  dependsOn:
    #- Wake_Up_Signal
    - Set_Build_Number
  condition: and(succeeded(), or(eq('${{ parameters.targetOS }}', 'Linux'), eq('${{ parameters.targetOS }}', 'All')))

  jobs:
  - job: Ubuntu
    timeoutInMinutes: 45
    cancelTimeoutInMinutes: 1
    displayName: Ubuntu

    strategy:
      matrix:
        GCC:
          poolName: 'LinuxPool'
          imageName: 'ubuntu-24.04'
          architecture: 'x64'
          compiler: 'GCC'
          qt_version: '6.10.2'
          qt_version_major: '6'
          qt_modules: 'qtserialport qtmultimedia'
          cmake_preset: 'RelWithDebInfo'
          linux_path: '/opt/Qt/$(qt_version)/gcc_64/lib/cmake:/opt/Qt/$(qt_version)/gcc_64/bin:/opt/Qt/$(qt_version)/gcc_64/plugins:$PATH'
          cmake_version_params: '-DVERSION_MAJOR=${{ parameters.versionMajor }} -DVERSION_MINOR=${{ parameters.versionMinor }} -DVERSION_PATCH=${{ parameters.versionPatch }} -DIS_BETA=${{ lower(eq(parameters.buildType, ''PrivateBeta'')) }}'
          cmake_additional_param: '-DCMAKE_C_COMPILER=gcc -DCMAKE_CXX_COMPILER=g++ -DIS_AZURE_BUILD=TRUE'

    pool:
      name: $(poolName)

    steps:
      - template: templates/checkout.yml

      - script: |
          export PATH=$(linux_path)
          cd "$(Pipeline.Workspace)/Arduino-Source-Internal/Repository/Public/SerialPrograms"
          cmake --preset=$(cmake_preset) $(cmake_additional_param) $(cmake_version_params)
        displayName: 'Configure CMake'
        condition: succeeded()

      - script: |
          export PATH=$(linux_path)
          cd "$(Pipeline.Workspace)/Arduino-Source-Internal/Repository/Public/SerialPrograms"
          cmake --build --preset=$(cmake_preset) -j 16
        displayName: 'Build'
        condition: succeeded()

      - script: |
          set -e
          export PATH=$(linux_path)
          BUILD_DIR="$(Pipeline.Workspace)/Arduino-Source-Internal/Repository/Public/build/$(cmake_preset)"

          echo "=== Extracting debug symbols ==="
          cd "$BUILD_DIR"
          objcopy --only-keep-debug SerialPrograms SerialPrograms.debug
          objcopy --strip-debug SerialPrograms
          objcopy --add-gnu-debuglink=SerialPrograms.debug SerialPrograms
          mkdir -p "$(Pipeline.Workspace)/Arduino-Source-Internal/Repository/Public/build/$(cmake_preset)/cache-symbols"
          mv SerialPrograms.debug "$(Pipeline.Workspace)/Arduino-Source-Internal/Repository/Public/build/$(cmake_preset)/cache-symbols/SerialPrograms.debug"
          echo "=== Debug symbols extracted to SerialPrograms.debug ==="
        displayName: 'Extract Debug Symbols'
        condition: succeeded()

      - script: |
          set -e
          export LINUXDEPLOY_DISABLE_APPSTREAM=1
          export PATH=$(linux_path)
          BUILD_DIR="$(Pipeline.Workspace)/Arduino-Source-Internal/Repository/Public/build/$(cmake_preset)"
          SRC_DIR="$(Pipeline.Workspace)/Arduino-Source-Internal/Repository/Public"
          APP_DIR="$BUILD_DIR/AppDir"
          BUILD_CACHE_DIR="$(Pipeline.Workspace)/Arduino-Source-Internal/Repository/Public/build/$(cmake_preset)/cache-build"

          echo "=== Clean AppDir ==="
          rm -rf "$APP_DIR"
          mkdir -p "$APP_DIR"
          mkdir -p "$APP_DIR/usr/bin"
          mkdir -p "$APP_DIR/usr/lib"
          mkdir -p "$APP_DIR/usr/share/applications"
          mkdir -p "$APP_DIR/usr/share/icons/hicolor/256x256/apps"
          mkdir -p "$BUILD_CACHE_DIR"

          echo "=== Moving resources ==="
          mkdir -p "$APP_DIR/usr/plugins/iconengines"
          cp -a "/opt/Qt/$(qt_version)/gcc_64/plugins/iconengines/" "$APP_DIR/usr/plugins/iconengines/"

          mkdir -p "$APP_DIR/usr/share/metainfo"
          cp "$SRC_DIR/IconResource/SerialPrograms.desktop" "$APP_DIR/usr/share/applications/"
          cp "$SRC_DIR/IconResource/SerialPrograms.png" "$APP_DIR/usr/share/icons/hicolor/256x256/apps/"
          cp "$SRC_DIR/IconResource/SerialPrograms.appdata.xml" "$APP_DIR/usr/share/metainfo/"
          cp "$BUILD_DIR/SerialPrograms" "$APP_DIR/usr/bin"

          echo "=== Extracting Discord Social SDK ==="
          DISCORD_ZIP="$SRC_DIR/3rdPartyBinaries/discord_social_sdk_linux.zip"
          DISCORD_DIR="$SRC_DIR/3rdPartyBinaries/discord_social_sdk_linux"
          rm -rf "$DISCORD_DIR"
          mkdir -p "$DISCORD_DIR"
          unzip -q "$DISCORD_ZIP" -d "$SRC_DIR/3rdPartyBinaries"
          DISCORD_SO="$DISCORD_DIR/lib/release/libdiscord_partner_sdk.so"

          echo "=== Downloading linuxdeploy, Qt plugin, gstreamer plugin ==="
          cd "$BUILD_DIR"
          wget -nv https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          wget -nv https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage
          wget -nv https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage
          wget -nv https://raw.githubusercontent.com/linuxdeploy/linuxdeploy-plugin-gstreamer/master/linuxdeploy-plugin-gstreamer.sh
          chmod +x linuxdeploy-*.AppImage
          chmod +x appimagetool-x86_64.AppImage
          chmod +x linuxdeploy-plugin-gstreamer.sh

          echo "=== Running linuxdeploy to package AppImage ==="
          export QMAKE="/opt/Qt/$(qt_version)/gcc_64/bin/qmake"
          export EXTRA_QT_PLUGINS="multimedia"
          ./linuxdeploy-x86_64.AppImage \
              --appdir "$APP_DIR" \
              -d "$APP_DIR/usr/share/applications/SerialPrograms.desktop" \
              -i "$APP_DIR/usr/share/icons/hicolor/256x256/apps/SerialPrograms.png" \
              -e "$APP_DIR/usr/bin/SerialPrograms" \
              -l "$DISCORD_SO" \
              -p qt \
              -p gstreamer \
              -v 3

          echo "=== Removing unnecessary Qt files ==="
          rm -rf "$APP_DIR/usr/translations"

          echo "=== Patching AppRun to force GStreamer backend ==="
          sed -i '2i export PA_APPIMAGE_DIR=$(cd "$(dirname "$APPIMAGE")" && pwd)' "$APP_DIR/AppRun"
          sed -i '2i export QT_MEDIA_BACKEND=gstreamer' "$APP_DIR/AppRun"

          echo "=== Packaging AppImage ==="
          ./appimagetool-x86_64.AppImage AppDir
          rm linuxdeploy-*.AppImage
          rm appimagetool-x86_64.AppImage

          echo "=== Archive Linux AppImage ==="
          VERSION="${{ parameters.versionMajor }}.${{ parameters.versionMinor }}.${{ parameters.versionPatch }}"
          FOLDER_NAME="SerialPrograms-$VERSION-Ubuntu-x64"
          BUILD_TYPE="${{ parameters.buildType }}"

          mkdir -p "$FOLDER_NAME"
          mv "SerialPrograms-x86_64.AppImage" "$FOLDER_NAME/SerialPrograms.AppImage"
          chmod +x "$FOLDER_NAME/SerialPrograms.AppImage"
          cp -a "$SRC_DIR/Packages/Firmware/" "$FOLDER_NAME/"
          cp -a "$SRC_DIR/Packages/Resources/" "$FOLDER_NAME/"

          if [ "$BUILD_TYPE" != "Commit" ]; then
              ZIP_NAME="SerialPrograms-Ubuntu-$(compiler)-$(architecture).zip"
              rm -rf "$BUILD_CACHE_DIR"/*
              if [ "$BUILD_TYPE" = "PrivateBeta" ]; then
                  echo "=== Creating password-protected archive ==="
                  7z a -tzip -mx=9 "-p$ARTIFACT_PASSWORD" -mem=AES256 "$BUILD_CACHE_DIR/$ZIP_NAME" "$FOLDER_NAME"
              else
                  echo "=== Creating archive ==="
                  7z a -tzip -mx=9 "$BUILD_CACHE_DIR/$ZIP_NAME" "$FOLDER_NAME"
              fi
              echo "=== Archive created ==="
          else
              echo "=== Skipping archive creation for Commit build ==="
          fi
        displayName: 'Deploy AppImage'
        condition: succeeded()
        env:
          ARTIFACT_PASSWORD: $(ARTIFACT_PASSWORD)

      - task: Cache@2
        displayName: 'Cache build artifact for GitHub release'
        inputs:
          key: 'ubuntu-build | "$(Build.BuildId)"'
          path: '$(Pipeline.Workspace)/Arduino-Source-Internal/Repository/Public/build/$(cmake_preset)/cache-build'
        condition: and(succeeded(), eq('${{ parameters.targetOS }}', 'All'), or(eq('${{ parameters.buildType }}', 'Release'), eq('${{ parameters.buildType }}', 'Beta')))

      - task: Cache@2
        displayName: 'Cache debug symbols'
        inputs:
          key: 'ubuntu-symbols | "$(Build.BuildId)"'
          path: '$(Pipeline.Workspace)/Arduino-Source-Internal/Repository/Public/build/$(cmake_preset)/cache-symbols'
        condition: succeeded()

      - task: PublishPipelineArtifact@1
        displayName: 'Publish Linux artifact (PrivateBeta)'
        inputs:
          targetPath: '$(Pipeline.Workspace)/Arduino-Source-Internal/Repository/Public/build/$(cmake_preset)/SerialPrograms-Ubuntu-$(compiler)-$(architecture).zip'
          artifactName: 'SerialPrograms-Linux-$(compiler)-$(architecture)'
          publishLocation: 'pipeline'
        condition: and(succeeded(), eq('${{ parameters.buildType }}', 'PrivateBeta'))

      - task: PublishPipelineArtifact@1
        displayName: 'Publish Linux artifact'
        inputs:
          targetPath: '$(Pipeline.Workspace)/Arduino-Source-Internal/Repository/Public/build/$(cmake_preset)/SerialPrograms-${{ parameters.versionMajor }}.${{ parameters.versionMinor }}.${{ parameters.versionPatch }}-Ubuntu-x64'
          artifactName: 'SerialPrograms-Linux-$(compiler)-$(architecture)'
          publishLocation: 'pipeline'
        condition: and(succeeded(), ne('${{ parameters.buildType }}', 'PrivateBeta'))

###########################################
#           MACOS BUILD STAGES            #
###########################################

- template: templates/macos-build.yml
  parameters:
    stageName: MacOS_Build_ARM64
    displayName: 'MacOS Build ARM64'
    dependsOnStage: Set_Build_Number
    buildType: ${{ parameters.buildType }}
    targetOS: ${{ parameters.targetOS }}
    poolName: ApplePool
    imageName: macos-26
    architecture: arm64
    compiler: Clang
    qt_version: '6.10.2'
    qt_version_major: '6'
    qt_modules: 'qtserialport qtmultimedia'
    cmake_preset: RelWithDebInfo
    macos_path: '/opt/Qt/6.10.2/macos/lib/cmake:/opt/Qt/6.10.2/macos/bin:/opt/homebrew/bin:/opt/homebrew/sbin:/opt/homebrew:$PATH'
    openssl_pkcs_args: '-legacy'
    cmake_version_params: '-DVERSION_MAJOR=${{ parameters.versionMajor }} -DVERSION_MINOR=${{ parameters.versionMinor }} -DVERSION_PATCH=${{ parameters.versionPatch }} -DIS_BETA=${{ lower(eq(parameters.buildType, ''PrivateBeta'')) }}'
    cmake_additional_param: '-DPACKAGE_BUILD=true -DUNIX_LINK_TESSERACT:BOOL=true -DIS_AZURE_BUILD=TRUE'
    versionMajor: ${{ parameters.versionMajor }}
    versionMinor: ${{ parameters.versionMinor }}
    versionPatch: ${{ parameters.versionPatch }}
    condition: or(eq('${{ parameters.targetOS }}', 'MacOS'), eq('${{ parameters.targetOS }}', 'All'))

- template: templates/macos-build.yml
  parameters:
    stageName: MacOS_Build_x64
    displayName: 'MacOS Build x64'
    dependsOnStage: Set_Build_Number
    buildType: ${{ parameters.buildType }}
    targetOS: ${{ parameters.targetOS }}
    poolName: ApplePool
    imageName: macos-15
    architecture: x64
    compiler: Clang
    qt_version: '6.10.2'
    qt_version_major: '6'
    qt_modules: 'qtserialport qtmultimedia'
    cmake_preset: RelWithDebInfo
    macos_path: '/usr/local/Qt/6.10.2/macos/lib/cmake:/usr/local/Qt/6.10.2/macos/bin:/usr/local/bin:/usr/local/sbin:/usr/local:$PATH'
    openssl_pkcs_args: '-legacy'
    cmake_version_params: '-DVERSION_MAJOR=${{ parameters.versionMajor }} -DVERSION_MINOR=${{ parameters.versionMinor }} -DVERSION_PATCH=${{ parameters.versionPatch }} -DIS_BETA=${{ lower(eq(parameters.buildType, ''PrivateBeta'')) }}'
    cmake_additional_param: '-DPACKAGE_BUILD=true -DUNIX_LINK_TESSERACT:BOOL=true -DIS_AZURE_BUILD=TRUE'
    versionMajor: ${{ parameters.versionMajor }}
    versionMinor: ${{ parameters.versionMinor }}
    versionPatch: ${{ parameters.versionPatch }}
    condition: or(eq('${{ parameters.targetOS }}', 'MacOS'), eq('${{ parameters.targetOS }}', 'All'))

##########################################
#          UPLOAD DEBUG SYMBOLS          #
##########################################

- template: templates/upload-symbols.yml
  parameters:
    stageName: Upload_Debug_Symbols
    displayName: 'Upload Debug Symbols'
    dependsOn:
      - Windows_Build_x64
      - Linux_Build_x64
      - MacOS_Build_ARM64
      - MacOS_Build_x64
    platforms:
      - Windows
      - Linux
      - MacOS_ARM64
      - MacOS_x64
    poolName: WindowsPool
    buildType: ${{ parameters.buildType }}
    versionMajor: ${{ parameters.versionMajor }}
    versionMinor: ${{ parameters.versionMinor }}
    versionPatch: ${{ parameters.versionPatch }}
    condition: succeeded()

