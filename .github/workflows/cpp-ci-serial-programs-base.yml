name: C++ CI Serial Programs base
on:
  workflow_call:
    inputs:
      os: 
        required: true
        type: string

      compiler:
        required: true
        type: string

      upload-build:
        type: boolean
        default: false

      run-tests:
        type: boolean
        default: false

      run-clang-query:
        type: boolean
        default: false

jobs:
  build:
    runs-on: ${{inputs.os}}

    steps:
    - name: Set variables
      shell: bash
      run: |
        if [[ "${{inputs.compiler}}" == "clang" ]]; then
          if [[ "${{inputs.os}}" == windows* ]]; then
            CMAKE_ADDITIONAL_FLAGS="-T ClangCL"
          elif [[ "${{inputs.os}}" == ubuntu* ]]; then
            CMAKE_ADDITIONAL_FLAGS="-DCMAKE_C_COMPILER=clang -DCMAKE_CXX_COMPILER=clang++"
          fi
        fi
        echo "CMAKE_ADDITIONAL_FLAGS=$CMAKE_ADDITIONAL_FLAGS" >> $GITHUB_ENV

        if [[ "${{inputs.os}}" == windows* ]]; then
          UPLOAD_FOLDER="Arduino-Source/SerialPrograms/bin/RelWithDebInfo"
        else
          UPLOAD_FOLDER="Arduino-Source/SerialPrograms/bin"
        fi
        echo "UPLOAD_FOLDER=$UPLOAD_FOLDER" >> $GITHUB_ENV

    - name: Checkout Arduino-Source
      uses: actions/checkout@v6
      with:
        path: 'Arduino-Source'
        submodules: 'recursive'

    - name: Install Qt
      uses: jurplel/install-qt-action@v4
      with:
        version: '6.10.2'
        modules: 'qtmultimedia qtserialport'

    - name: Install dependencies (Ubuntu)
      if: startsWith(inputs.os, 'ubuntu')
      run: |
        cd Arduino-Source
        sudo apt update
        sudo apt upgrade
        sudo apt install clang-tools libopencv-dev

        sudo apt install ./3rdPartyBinaries/libdpp-10.0.28-linux-x64.deb

    - name: Install dependencies (Mac)
      if: startsWith(inputs.os, 'mac')
      run: |
        cd Arduino-Source
        brew install opencv onnxruntime

        brew tap-new --no-git PA/libdpp
        FORMULA_DIR="$(brew --repo PA/libdpp)/Formula"
        mkdir -p "$FORMULA_DIR"
        cp 3rdPartyBinaries/libdpp@10.0.28.rb "$FORMULA_DIR/"
        brew install libdpp@10.0.28

    - name: Generate binaries
      run: |
        cd Arduino-Source/SerialPrograms
        mkdir bin
        cd bin
        cmake .. -DQT_MAJOR:STRING=6 ${{env.CMAKE_ADDITIONAL_FLAGS}}
        cmake --build . --config RelWithDebInfo --parallel 10

    - name: Prepare upload build
      if: inputs.upload-build
      shell: bash
      run: |
        echo https://github.com/${{github.repository}}/commit/${{github.sha}} > ${{env.UPLOAD_FOLDER}}/version.txt

    - name: Upload Build
      uses: actions/upload-artifact@v7
      if: inputs.upload-build
      with:
        name: Serial Programs (os=${{inputs.os}} - compiler=${{inputs.compiler}})
        path: ${{env.UPLOAD_FOLDER}}

    - name: Checkout CommandLineTests
      uses: actions/checkout@v6
      if: inputs.run-tests
      with:
        repository: 'PokemonAutomation/CommandLineTests'
        path: 'CommandLineTests'

    - name: Run tests (Windows)
      if: startsWith(inputs.os, 'windows') && inputs.run-tests
      run: |
        cd Arduino-Source/SerialPrograms/bin
        $process = Start-Process -FilePath "./RelWithDebInfo/SerialPrograms.exe" `
                                 -ArgumentList "--command-line-test-mode --command-line-test-folder ../../../CommandLineTests" `
                                 -NoNewWindow -Wait -PassThru
        if ($process.ExitCode -ne 0) {
            Write-Error "Tests failed with exit code $($process.ExitCode)"
            exit 1
        }

    - name: Run tests (Mac)
      if: startsWith(inputs.os, 'mac') && inputs.run-tests
      run: |
        cd Arduino-Source/SerialPrograms/bin
        ./SerialPrograms.app/Contents/MacOS/SerialPrograms --command-line-test-mode --command-line-test-folder ../../../CommandLineTests

    - name: Run clang query
      if: inputs.run-clang-query
      run : |
        cd Arduino-Source

        # git diff with relative paths
        git diff --name-only origin/main...HEAD > changed_files.txt

        echo "Generating clang-scan-deps experimental-full > deps.json."
        # get dependency graph
        clang-scan-deps -compilation-database compile_commands.json -format experimental-full > deps.json

        # normalize slashes
        # sed 's|\\\\|/|g' deps.json > normalized_deps.json
        sed -i 's|\\\\|/|g' deps.json

        # check if deps.json has the expected keys
        # because we are relying on clang-scan-deps experimental-full, where the names of the keys can change.
        TU_KEY="translation-units"
        CMD_KEY="commands"
        DEPS="file-deps"
        INPUT="input-file"

        JQ_SCRIPT=$(cat << 'EOF'
            # 1. Access the target object
          (.[$TU][0][$CMD][0]) as $target
          
          # 2. Define the required keys

          | [$DEPS, $INPUT] as $required

          | (
            if .[$TU] == null then 
                "Missing: \($TU). Keys found at top-level: \(keys_unsorted)"
            elif .[$TU][0] == null then 
                "Missing: \($TU)[0]"
            elif .[$TU][0].[$CMD] == null then 
                "Missing: \($TU)[0].\($CMD). Keys found from \($TU)[0]: \(.[$TU][0] | keys_unsorted)"
            elif $target == null then 
                "Missing: \($TU)[0].[$CMD][0]"
            elif ($required | all(. as $req | $target | has($req)) | not) then
              "Missing: One or more required keys \($required). Found: \($target | keys_unsorted)"
            # elif (.[$TU][0].[$CMD][0] | keys_unsorted | any(. == [$DEPS] or . == [$INPUT]) | not) then
            #     "Missing: both \($DEPS) and \($INPUT). Found: \(.[$TU][0][$CMD][0] | keys_unsorted)"
            else 
              "All keys \($required) found in \($TU)[0].\($CMD)[0]"
            end
          ) as $result

          | if ($result | type == "string" and startswith("Missing:")) then 
                ("\($result). The keys within the experimental-full format from clang-scan-deps can change over time. Please fix the CI to use the correct keys.") | halt_error
                else $result end
        EOF
        )

        echo "Checking keys in deps.json."
        jq -r "$JQ_SCRIPT" \
            --arg TU "$TU_KEY" \
            --arg CMD "$CMD_KEY" \
            --arg DEPS "$DEPS" \
            --arg INPUT "$INPUT" \
            deps.json

        echo "Generating files_to_query.txt."
        # for each line in changed_files.txt, search deps.json to find all their dependants
        # 
        jq -r --rawfile mod changed_files.txt \
            --arg TU "$TU_KEY" \
            --arg CMD "$CMD_KEY" \
            --arg DEPS "$DEPS" \
            --arg INPUT "$INPUT" '
          # 1. Clean the list of changed files
          ($mod | split("\n") | map(select(length > 0))) as $changes |
          
          # 2. Access the translation-units array
          [ .[$TU][] | .[$CMD][] | 
            select(
              # 3. Check "file-deps" for matches
              .[$DEPS][] | . as $dp | 
              any($changes[]; . as $c | $dp | endswith($c))
            ) | 
            # 4. Get the source file path
            .[$INPUT] 
          ] | unique[]
        ' normalized_deps.json > files_to_query.txt

        cat << 'EOF' > query.txt
        set output dump
        match invocation(
          isExpansionInFileMatching("SerialPrograms/"),
          hasDeclaration(cxxConstructorDecl(ofClass(hasName("std::filesystem::path")))),
          hasArgument(0, hasType(asString("std::string")))
        )
        EOF

        files=$(jq -r '.[].file' SerialPrograms/bin/compile_commands.json)
        echo "$files" | xargs --max-args=150 clang-query -p SerialPrograms/bin/ -f query.txt >> output.txt
        cat output.txt
        if grep --silent "Match #" output.txt; then
          echo "::error Forbidden std::filesystem::path construction detected!"
          exit 1
        fi
